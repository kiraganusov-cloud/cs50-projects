<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <title>Trivia!</title>
        <script>
            // TODO: Add code to check answers to questions
            function checkMultiChoice(event) {

                // get the element which triggered the event
                let button = event.target;

                // Check if the element's inner HTML matches epected answer
                if (button.innerHTML == '8766') {
                    button.style.backgroundColor = 'Green';
                    button.parentElement.querySelector('.feedback').innerHTML = 'Correct!';
                }
                else {
                    button.style.backgroundColor = 'Red';
                    button.parentElement.querySelector('.feedback').innerHTML = 'Incorrect';
                }
            }

            function checkFreeResponse(event) {

                // Get the element which triggered the event
                let button = event.target;

                // get the input element corresponding to the button
                let input = button.parentElement.querySelector('input')

                // Check if the input is the correct answer
                if (input.value === 'Rubber Ducks') {
                    input.style.backgroundColor = 'Green';
                    input.parentElement.querySelector('.feedback').innerHTML = 'Correct!';
                }
                else {
                    input.style.backgroundColor = 'Red';
                    input.parentElement.querySelector('.feedback').innerHTML = 'Incorrect';
                }
            }

        </script>
    </head>
    <body>
        <div class="header">
            <h1>Trivia!</h1>
        </div>

        <div class="container">
            <div class="section">
                <h2>Part 1: Multiple Choice </h2>
                <hr>
                <!-- TODO: Add multiple choice question here -->
                 <h3>How many hours are there in a year?</h3>
                 <button onclick="checkMultiChoice(event)">8766</button>
                 <button onclick="checkMultiChoice(event)">3600</button>
                 <button onclick="checkMultiChoice(event)">365</button>
                 <button onclick="checkMultiChoice(event)">2465</button>
                 <button onclick="checkMultiChoice(event)">8760</button>
                 <p class="feedback"></p>


            </div>

            <div class="section">
                <h2>Part 2: Free Response</h2>
                <hr>
                <!-- TODO: Add free response question here -->
                <h3>What does Kira like to collect?</h3>
                <input type="text"></input>
                <button onclick="checkFreeResponse(event)">Check Answer</button>
                <p class="feedback"></p>

            </div>
        </div>
    </body>
</html>
