{% extends "layout.html" %}

{% block title %}
    History
{% endblock %}

{% block main %}
    <h2>History</h2>

    <table class="table table-striped table-hover">
        <thead>
            <tr>
                <th>Time</th>
                <th>Action</th>
                <th>Symbol</th>
                <th>Shares</th>
                <th>Price</th>
            </tr>
        </thead>

        <tbody>
            {% for row in rows %}
                <tr>
                    <td>{{ row.time }}</td>
                    <td>{{ row.action }}</td>
                    <td>{{ row.symbol }}</td>
                    <td>{{ row.share }}</td>
                    <td>{{ "%.2f"|format(row.price) }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
