{% extends "layout.html" %}

{% block title %}
    Register
{% endblock %}

{% block main %}
    <form action="/register" method="post">
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="username" placeholder="Username" type="text">
        </div>
        <div class="mb-3">
            <input class="form-control mx-auto w-auto" autocomplete="off" name="password" placeholder="Password" type="password">
        </div>
        <div class="mb-3">
            <input class="form-control mx-auto w-auto" autocomplete="off" name="confirmation" placeholder="Confirmation" type="password">
        </div>

        {% for message in get_flashed_messages() %}
            <div class="alert alert-danger mt-2 mx-auto w-auto" style="max-width: 300px;">
                {{ message }}
            </div>
        {% endfor %}

        <button class="btn btn-primary" type="submit">Register</button>
    </form>
{% endblock %}
