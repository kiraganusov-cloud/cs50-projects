{% extends "layout.html" %}

{% block title %}
    Register
{% endblock %}

{% block main %}
    <form action="/register" method="post">
        <input autocomplete="off" name="username" placeholder="Username" type="text">
        <input autocomplete="off" name="password" placeholder="Password" type="text">
        <input autocomplete="off" name="confirmation" placeholder="Confirmation" type="text">
        <input type="submit" value="Register">
    </form>
{% endblock %}
